worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  access_log    /dev/stdout;
  sendfile      on;
  tcp_nopush    on;
  server_tokens off;

  # Hashed build assets (…/assets/app.abc123.js) are content-addressed and safe
  # to cache forever; everything else (index.html, JSON) must revalidate so a
  # promote/rollback is visible immediately.
  map $uri $cache_control {
    default                          "no-cache";
    "~*/assets/"                     "public, max-age=31536000, immutable";
    "~*\.(?:woff2?|ttf|otf|eot)$"    "public, max-age=31536000, immutable";
  }

  server {
    listen 8080;
    # The artifact stage (@SNOW_DEPLOY.CORE.ARTIFACTS) is mounted here by SPCS.
    root /artifacts;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    add_header Cache-Control $cache_control always;

    # Liveness/readiness probe for the SPCS service.
    location = /healthz { default_type text/plain; return 200 "ok\n"; }

    # Landing page at the root.
    location = / {
      default_type text/html;
      return 200 '<!doctype html><meta charset=utf-8><title>snow-deploy</title><body style="font-family:system-ui;background:#0b0b0f;color:#fafafa;display:grid;place-items:center;height:100vh;margin:0"><div style="text-align:center"><div style="font-size:42px">&#9650;</div><h1>snow-deploy</h1><p style="opacity:.6">Static apps served from Snowflake. Visit <code>/&lt;project&gt;/</code>.</p></div>';
    }

    # The policy folder is config, not content — never serve it.
    location ^~ /_meta/ { return 404; }

    # Per-app authorization: every app request is checked by the auth sidecar
    # against the policy file published to the stage (_meta/access.json).
    # X-User carries the Snowflake username injected by SPCS ingress after it
    # authenticates the visitor (Sf-Context-Current-User).
    location = /_auth {
      internal;
      proxy_pass http://127.0.0.1:8081/check;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
      proxy_set_header X-Slug $auth_slug;
      proxy_set_header X-User $http_sf_context_current_user;
    }

    error_page 403 = @denied;
    location @denied {
      default_type text/html;
      return 403 '<!doctype html><meta charset=utf-8><title>403</title><body style="font-family:system-ui;background:#0b0b0f;color:#fafafa;display:grid;place-items:center;height:100vh;margin:0"><div style="text-align:center"><h1>403</h1><p style="opacity:.6">You have not been granted access to this app.<br>Ask the project owner to run <code>snowd access grant</code>.</p></div>';
    }

    # Preview deployments:  /{slug}/~/{deploymentId}/...
    # (Matched before the production rule below.)
    location ~ ^/(?<slug>[^/]+)/~/(?<dep>[^/]+)(?<rest>/.*)?$ {
      set $auth_slug $slug;
      auth_request /_auth;
      try_files /$slug/$dep$rest /$slug/$dep$rest/index.html /$slug/$dep/index.html =404;
    }

    # Production:  /{slug}/...  → the materialized _prod folder, with SPA fallback.
    location ~ ^/(?<slug2>[^/]+)(?<rest2>/.*)?$ {
      set $auth_slug $slug2;
      auth_request /_auth;
      try_files /$slug2/_prod$rest2 /$slug2/_prod$rest2/index.html /$slug2/_prod/index.html =404;
    }
  }
}
